services:
  # PostgreSQL database service
  postgres:
    image: postgres:17.4-alpine
    container_name: devops-postgres
    restart: always
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-autoops}
      POSTGRES_USER: ${POSTGRES_USER:-devops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devops@2025}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      # Persistent data directory
      - ./postgres/data:/var/lib/postgresql/data
      # Initialization SQL scripts (executed in alphabetical order)
      - ./postgres/init:/docker-entrypoint-initdb.d
    command:
      - postgres
      - -c
      - log_statement=mod
      - -c
      - log_min_duration_statement=1000
    networks:
      - devops-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-devops} -d ${POSTGRES_DB:-autoops}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Valkey cache service (Redis-compatible, BSD-licensed)
  valkey:
    image: valkey/valkey:9.0.3-alpine
    container_name: devops-valkey
    restart: always
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    command: valkey-server --requirepass ${REDIS_PASSWORD:-zhangfan@123} --appendonly yes
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      # Persistent data directory
      - ./valkey/data:/data
      # Valkey configuration
      - ./valkey/valkey.conf:/usr/local/etc/valkey/valkey.conf
    networks:
      - devops-network
    healthcheck:
      test: [ "CMD-SHELL", "valkey-cli -a $${REDIS_PASSWORD:-zhangfan@123} ping" ]
      interval: 10s
      timeout: 3s
      retries: 5

  # Pushgateway metrics push service
  pushgateway:
    image: prom/pushgateway:v1.11.2
    container_name: devops-pushgateway
    restart: always
    user: root
    ports:
      - "127.0.0.1:${PUSHGATEWAY_PORT:-9091}:9091"
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      # Persistent data
      - ./pushgateway/data:/pushgateway
    networks:
      - devops-network
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9091/-/healthy" ]
      interval: 10s
      timeout: 3s
      retries: 5

  # Prometheus monitoring service
  prometheus:
    image: prom/prometheus:v2.53.5
    container_name: devops-prometheus
    restart: always
    user: root
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      # Prometheus configuration
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      # Persistent data directory
      - ./prometheus/data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    networks:
      - devops-network
    depends_on:
      pushgateway:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy" ]
      interval: 10s
      timeout: 3s
      retries: 5

  # DevOps API backend service
  devops-api:
    build:
      context: ../api
      dockerfile: ../docker/api/Dockerfile
    image: devops-api:local
    container_name: devops-api
    restart: always
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      # 传递环境变量到容器(供应用读取)
      IMAGE_HOST: ${IMAGE_HOST:-http://localhost:8080}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${POSTGRES_DB:-autoops}
      DB_USER: ${POSTGRES_USER:-devops}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-devops@2025}
      REDIS_ADDR: ${REDIS_ADDR:-valkey:6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-zhangfan@123}
    volumes:
      # Configuration file
      - ./api/config.yaml:/app/config.yaml
      # Logs directory
      - ./api/logs:/app/log
      # Upload files directory
      - ./api/upload:/app/upload
      # Excel template file
      - ./api/upload/host.xlsx:/app/upload/xlsl/host.xlsx
      # SSH keys (persistent across container restarts)
      - ./api/ssh_keys:/root/.ssh:ro
    networks:
      - devops-network
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:8000/api/v1/healthz"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # DevOps Web frontend service
  devops-web:
    build:
      context: ../
      dockerfile: docker/web/Dockerfile
    image: devops-web:local
    container_name: devops-web
    restart: always
    ports:
      - "${WEB_PORT:-8080}:80"
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      # Nginx configuration
      - ./web/devops.conf:/etc/nginx/conf.d/default.conf
      # Upload files static service (shared with API)
      - ./api/upload:/home/devops/upload
    networks:
      - devops-network
    depends_on:
      - devops-api
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:80" ]
      interval: 10s
      timeout: 3s
      retries: 5

networks:
  devops-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres-data:
  valkey-data:
  prometheus-data:
  pushgateway-data:
